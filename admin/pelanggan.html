<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pelanggan Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/pelanggan.css">
</head>
<body>
    <div class="app-layout">

    <div class="sidebar">
        <h2>🧺 Laundry</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="pelanggan.html" class="active">👥 Pelanggan</a>
        <a href="layanan.html">🧼 Layanan</a>
        <a href="pesanan.html">📦 Pesanan</a>
        <a href="transaksi.html">💰 Transaksi</a>
        <a href="laporan.html">📊 Laporan</a>
        <a href="../index.html">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="container-fluid p-3">
            <div class="card p-3">
                <h3 class="mb-3">Tambah Pelanggan</h3>
                <div class="row g-2">
                    <div class="col-md-4 mb-2">
                        <input type="text" id="nama" class="form-control" placeholder="Nama Pelanggan">
                    </div>
                    <div class="col-md-4 mb-2">
                        <input type="text" id="alamat" class="form-control" placeholder="Alamat">
                    </div>
                    <div class="col-md-4 mb-2">
                        <input type="text" id="telepon" class="form-control" placeholder="Nomor Telepon">
                    </div>
                </div>
                <button class="btn btn-primary mt-1" onclick="tambahPelanggan()">+ Tambah Pelanggan</button>
            </div>
            <div class="card p-3 mt-3">
                <h3>Daftar Pelanggan</h3>
                <table class="table table-striped table-hover mt-2">
                    <thead class="table-primary">
                        <tr><th>ID</th><th>Nama</th><th>Alamat</th><th>Telepon</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="dataPelanggan">
                        <tr>
                            <td>1</td><td>Thelma Diana</td><td>Fakfak</td><td>08123456789</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editBaris(this)">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="hapusBaris(this)">Hapus</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../style/pelanggan.js"></script>
    </div>
</body>
</html>
