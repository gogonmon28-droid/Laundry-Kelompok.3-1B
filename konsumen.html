<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Laundry - LaundryKu</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style/konsumen.css">
</head>

<body class="page-konsumen">
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-shirt"></i> Laundry Premium
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#layanan">Layanan</a></li>
                    <li class="nav-item"><a class="nav-link" href="lacak_pesanan.html">Progress cucian</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#harga">Harga</a></li>
                    <li class="nav-item"><a class="nav-link" href="kelompok.html">Kelompok Kami</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#kontak">Kontak</a></li>
                    <li class="nav-item ms-2">
                        <a href="admin/admin-login.html" class="btn btn-warning btn-sm">Login Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
<div class="header">
    <h1>🧺 Pemesanan Laundry</h1>
    <p>Isi data di bawah untuk melakukan pemesanan</p>
</div>

<div class="container mt-3 mb-4">
    <div class="card">
        <div class="card-body p-3">
            <div class="mb-2">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-control" id="nama">
            </div>
            <div class="mb-2">
                <label class="form-label">Nomor HP</label>
                <input type="text" class="form-control" id="hp">
            </div>
            <div class="mb-2">
                <label class="form-label">Alamat</label>
                <textarea class="form-control" rows="2" id="alamat"></textarea>
            </div>
            <div class="mb-2">
                <label class="form-label">Layanan Laundry</label>
                <select class="form-select" id="layanan">
                    <option>Cuci Kering</option>
                    <option>Cuci Setrika</option>
                    <option>Setrika Saja</option>
                    <option>Express 1 Hari</option>
                </select>
            </div>
            <div class="mb-2">
                <label class="form-label">Berat Laundry (Kg)</label>
                <input type="number" class="form-control" id="berat">
            </div>
            <div class="mb-2">
                <label class="form-label">Metode Pengantaran</label>
                <select class="form-select" id="antar">
                    <option>Dijemput Kurir</option>
                    <option>Antar Sendiri</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Metode Pembayaran</label>
                <select class="form-select" id="bayar">
                    <option>Tunai</option>
                    <option>Transfer Bank</option>
                    <option>DANA</option>
                    <option>OVO</option>
                    <option>GoPay</option>
                </select>
            </div>
            <button class="btn btn-primary btn-pesan" onclick="pesanLaundry()">Pesan Sekarang</button>
        </div>
    </div>

    <div class="card mt-3" id="hasilPesan">
        <div class="card-body text-center p-3">
            <h3 class="text-success" style="font-size:16px">✅ Pesanan Berhasil</h3>
            <p id="kodePesanan"></p>
            <p class="mon">
                Simpan kode pesanan Anda untuk digunakan
                pada menu <a href="lacak_pesanan.html">Progress cucian</a>.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="style/konsumen.js"></script>
</body>
</html>
